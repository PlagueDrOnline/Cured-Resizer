<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cured Resizer | Plague-Doctor-Labs</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    
    <style>
        :root {
            --neon-green: #00ff00;
            --bg-dark: #0a0a0a;
        }
        body { background-color: var(--bg-dark); color: var(--neon-green); }
        .terminal { max-width: 500px; margin: 2rem auto; padding: 2rem; border: 2px solid var(--neon-green); border-radius: 8px; }
        button { background-color: var(--neon-green) !important; color: #000 !important; font-weight: bold; }
    </style>
</head>
<body>

<main class="container">
    <div class="terminal">
        <h1>🎭 CURED RESIZER v1.0</h1>
        <p>Optimizing for GitHub Social Previews</p>
        
        <div class="upload-box" onclick="document.getElementById('fileInput').click()" style="border: 1px dashed var(--neon-green); padding: 20px; cursor: pointer; text-align: center; margin-bottom: 1rem;">
            <span id="fileLabel">DROP FILE OR CLICK TO UPLOAD</span>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>

        <label>QUALITY COMPRESSION (0.1 - 1.0)</label>
        <input type="number" id="quality" value="0.8" step="0.1" min="0.1" max="1.0">
        
        <button id="processBtn">Inject Resize & Download</button>
        <div id="status">Protocol Ready...</div>
    </div>
</main>

<canvas id="canvas" style="display: none;"></canvas>

<script>
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const status = document.getElementById('status');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    fileInput.onchange = e => { if (e.target.files[0]) document.getElementById('fileLabel').innerText = e.target.files[0].name; };

    processBtn.onclick = () => {
        const file = fileInput.files[0];
        if (!file) return alert("No file detected.");
        status.innerText = "Processing Image...";
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = event => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                canvas.width = 1280;
                canvas.height = 640;
                ctx.fillStyle = "#000";
                ctx.fillRect(0, 0, 1280, 640);
                ctx.drawImage(img, 0, 0, 1280, 640);
                const quality = parseFloat(document.getElementById('quality').value);
                const dataUrl = canvas.toDataURL('image/jpeg', quality);
                const link = document.createElement('a');
                link.download = 'cured-social-preview.jpg';
                link.href = dataUrl;
                link.click();
                status.innerText = "Cure Applied. Check Downloads Folder.";
            };
        };
    };
</script>
</body>
</html>
